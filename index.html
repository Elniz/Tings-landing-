<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>TINGS Icon</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#1a1a1a;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:48px;padding:40px;}
.row{display:flex;gap:32px;align-items:center;flex-wrap:wrap;justify-content:center;}
.logo-box{display:flex;flex-direction:column;align-items:center;gap:12px;}
.label{font-family:sans-serif;font-size:.62rem;color:rgba(255,255,255,.3);letter-spacing:.2em;text-transform:uppercase;}

.tings-icon{
  position:relative;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  background:#F28C48;
  border-radius:22%;
  overflow:visible;
}
.t-letter{
  font-family:'Syne',sans-serif;
  font-weight:800;
  color:#FDFAF7;
  line-height:1;
  display:block;
  position:relative;
  z-index:1;
}
.record-wrap{
  position:absolute;
  z-index:2;
  display:flex;
  align-items:center;
  justify-content:center;
}
.record-outer{
  position:absolute;
  border-radius:50%;
  border:2px solid rgba(253,250,247,0.3);
  animation:pulse 2s ease-in-out infinite;
}
.record-mid{
  position:absolute;
  border-radius:50%;
  border:2px solid rgba(253,250,247,0.5);
}
.record-btn{
  border-radius:50%;
  background:#2A1A0A;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
  z-index:3;
}
.record-inner{
  border-radius:50%;
  background:#F5A870;
}

@keyframes pulse{
  0%,100%{transform:scale(1);opacity:0.3;}
  50%{transform:scale(1.15);opacity:0.15;}
}

/* 512px */
.sz-512{width:512px;height:512px;border-radius:114px;}
.sz-512 .t-letter{font-size:420px;margin-top:50px;letter-spacing:-20px;padding-left:30px;}
.sz-512 .record-wrap{top:48px;left:154px;}
.sz-512 .record-outer{width:120px;height:120px;}
.sz-512 .record-mid{width:90px;height:90px;}
.sz-512 .record-btn{width:64px;height:64px;}
.sz-512 .record-inner{width:28px;height:28px;}

/* 256px */
.sz-256{width:256px;height:256px;border-radius:57px;}
.sz-256 .t-letter{font-size:210px;margin-top:25px;letter-spacing:-10px;padding-left:15px;}
.sz-256 .record-wrap{top:24px;left:77px;}
.sz-256 .record-outer{width:60px;height:60px;}
.sz-256 .record-mid{width:45px;height:45px;}
.sz-256 .record-btn{width:32px;height:32px;}
.sz-256 .record-inner{width:14px;height:14px;}

/* 128px */
.sz-128{width:128px;height:128px;border-radius:28px;}
.sz-128 .t-letter{font-size:105px;margin-top:12px;letter-spacing:-5px;padding-left:8px;}
.sz-128 .record-wrap{top:12px;left:38px;}
.sz-128 .record-outer{width:30px;height:30px;}
.sz-128 .record-mid{width:22px;height:22px;}
.sz-128 .record-btn{width:16px;height:16px;}
.sz-128 .record-inner{width:7px;height:7px;}

/* 64px */
.sz-64{width:64px;height:64px;border-radius:14px;}
.sz-64 .t-letter{font-size:52px;margin-top:6px;letter-spacing:-2px;padding-left:4px;}
.sz-64 .record-wrap{top:6px;left:19px;}
.sz-64 .record-outer{width:15px;height:15px;}
.sz-64 .record-mid{width:11px;height:11px;}
.sz-64 .record-btn{width:8px;height:8px;}
.sz-64 .record-inner{width:3px;height:3px;}

/* DARK */
.dark{background:#2A1A0A;}
.dark .record-btn{background:#F28C48;}
.dark .record-inner{background:#2A1A0A;}
.dark .record-outer{border-color:rgba(242,140,72,0.3);}
.dark .record-mid{border-color:rgba(242,140,72,0.5);}

/* WHITE */
.white-bg{background:#FDFAF7;}
.white-bg .t-letter{color:#2A1A0A;}
.white-bg .record-btn{background:#F28C48;}
.white-bg .record-inner{background:#FDFAF7;}
.white-bg .record-outer{border-color:rgba(242,140,72,0.3);}
.white-bg .record-mid{border-color:rgba(242,140,72,0.5);}
</style>
</head>
<body>

<!-- BIG 512 -->
<div class="row">
  <div class="logo-box">
    <div class="label">App Store Icon · 512×512</div>
    <div class="tings-icon sz-512">
      <span class="t-letter">t</span>
      <div class="record-wrap">
        <div class="record-outer"></div>
        <div class="record-mid"></div>
        <div class="record-btn"><div class="record-inner"></div></div>
      </div>
    </div>
  </div>
</div>

<!-- MEDIUM SIZES -->
<div class="row">
  <div class="logo-box">
    <div class="label">256</div>
    <div class="tings-icon sz-256">
      <span class="t-letter">t</span>
      <div class="record-wrap">
        <div class="record-outer"></div>
        <div class="record-mid"></div>
        <div class="record-btn"><div class="record-inner"></div></div>
      </div>
    </div>
  </div>

  <div class="logo-box">
    <div class="label">128</div>
    <div class="tings-icon sz-128">
      <span class="t-letter">t</span>
      <div class="record-wrap">
        <div class="record-outer"></div>
        <div class="record-mid"></div>
        <div class="record-btn"><div class="record-inner"></div></div>
      </div>
    </div>
  </div>

  <div class="logo-box">
    <div class="label">64</div>
    <div class="tings-icon sz-64">
      <span class="t-letter">t</span>
      <div class="record-wrap">
        <div class="record-outer"></div>
        <div class="record-mid"></div>
        <div class="record-btn"><div class="record-inner"></div></div>
      </div>
    </div>
  </div>
</div>

<!-- COLOR VERSIONS -->
<div class="row">
  <div class="logo-box">
    <div class="label">Orange · Main</div>
    <div class="tings-icon sz-256">
      <span class="t-letter">t</span>
      <div class="record-wrap">
        <div class="record-outer"></div>
        <div class="record-mid"></div>
        <div class="record-btn"><div class="record-inner"></div></div>
      </div>
    </div>
  </div>

  <div class="logo-box">
    <div class="label">Dark</div>
    <div class="tings-icon dark sz-256">
      <span class="t-letter">t</span>
      <div class="record-wrap">
        <div class="record-outer"></div>
        <div class="record-mid"></div>
        <div class="record-btn"><div class="record-inner"></div></div>
      </div>
    </div>
  </div>

  <div class="logo-box">
    <div class="label">White</div>
    <div class="tings-icon white-bg sz-256">
      <span class="t-letter">t</span>
      <div class="record-wrap">
        <div class="record-outer"></div>
        <div class="record-mid"></div>
        <div class="record-btn"><div class="record-inner"></div></div>
      </div>
    </div>
  </div>
</div>

</body>
</html>
